  <script>
    const authToken = localStorage.getItem('authToken');

    if (!authToken) {
      window.location.href = '/';
    }

    localStorage.removeItem('loggedInUser');

    function parseJwtPayload(token) {
      try {
        const payload = token.split('.')[1];
        if (!payload) return null;
        const normalized = payload.replace(/-/g, '+').replace(/_/g, '/');
        const decoded = atob(normalized.padEnd(Math.ceil(normalized.length / 4) * 4, '='));
        return JSON.parse(decoded);
      } catch (error) {
        return null;
      }
    }

    const currentUser = parseJwtPayload(authToken);
    if (!currentUser) {
      localStorage.removeItem('authToken');
      window.location.href = '/';
    }

    const form = document.getElementById('employeeForm');
    const rowsBody = document.getElementById('rows');
    const countLabel = document.getElementById('countLabel');
    const statusLine = document.getElementById('statusLine');

    const employeeIdInput = document.getElementById('employeeId');
    const rankInput = document.getElementById('rank');
    const workInput = document.getElementById('work');
    const empDateInput = document.getElementById('empDate');
    const empDateDisplayInput = document.getElementById('empDateDisplay');
    const nameInput = document.getElementById('name');
    const departmentInput = document.getElementById('department');
    const startDateInput = document.getElementById('startDate');
    const startDateDisplayInput = document.getElementById('startDateDisplay');
    const civilIdInput = document.getElementById('civilId');
    const sectionInput = document.getElementById('section');
    const subSectionInput = document.getElementById('subSection');
    const endDateInput = document.getElementById('endDate');
    const endDateDisplayInput = document.getElementById('endDateDisplay');
    const titleInput = document.getElementById('title');
    const statusInput = document.getElementById('status');
    const noteInput = document.getElementById('note');

    const addBtn = document.getElementById('addBtn');
    const updateBtn = document.getElementById('updateBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const printBtn = document.getElementById('printBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const backBtn = document.getElementById('backBtn');
    const dateOpenButtons = document.querySelectorAll('.date-picker-trigger');

    let selectedId = null;
    let allEmployees = [];
    let departmentSectionRows = [];

    function showStatus(message, isError = false) {
      statusLine.className = `status-line show ${isError ? 'error' : 'ok'}`;
      statusLine.textContent = message;
    }

    function clearStatus() {
      statusLine.className = 'status-line';
      statusLine.textContent = '';
    }

    function validateForm() {
      const requiredErrors = [];
      if (!nameInput.value.trim()) requiredErrors.push('اسم الموظف');
      if (!departmentInput.value.trim()) requiredErrors.push('القسم');
      if (!civilIdInput.value.trim()) requiredErrors.push('الرقم المدني');
      if (!sectionInput.value.trim()) requiredErrors.push('النوبة');

      if (requiredErrors.length) {
        showStatus(`الحقول الإلزامية ناقصة: ${requiredErrors.join(' - ')}`, true);
        return false;
      }

      if (!/^\d{12}$/.test(civilIdInput.value.trim())) {
        showStatus('الرقم المدني يجب أن يكون 12 رقم بالضبط.', true);
        return false;
      }

      if (!selectedId) {
        const enteredCivilId = civilIdInput.value.trim();
        const duplicateEmployee = allEmployees.find((item) =>
          String(item.CivilID || '').trim() === enteredCivilId && String(item.ID) !== String(selectedId || '')
        );

        if (duplicateEmployee) {
          showStatus(`الرقم المدني مسجل مسبقاً باسم ${duplicateEmployee.Name || 'موظف آخر'}.`, true);
          return false;
        }
      }

      return true;
    }

    function parseFlexibleDate(value) {
      if (!value) {
        return null;
      }

      const raw = String(value).trim();
      if (!raw) {
        return null;
      }

      const ymd = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (ymd) {
        const year = Number(ymd[1]);
        const month = Number(ymd[2]);
        const day = Number(ymd[3]);
        return new Date(year, month - 1, day);
      }

      const dmy = raw.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
      if (dmy) {
        const day = Number(dmy[1]);
        const month = Number(dmy[2]);
        const year = Number(dmy[3]);
        return new Date(year, month - 1, day);
      }

      const isoWithTime = raw.match(/^(\d{4})-(\d{2})-(\d{2})T/);
      if (isoWithTime) {
        const year = Number(isoWithTime[1]);
        const month = Number(isoWithTime[2]);
        const day = Number(isoWithTime[3]);
        return new Date(year, month - 1, day);
      }

      return null;
    }

    function formatKuwaitDate(value) {
      const dateObj = parseFlexibleDate(value);
      if (!dateObj) {
        return '';
      }

      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      return `${year}/${month}/${day}`;
    }

    function toDateInputValue(value) {
      const dateObj = parseFlexibleDate(value);
      if (!dateObj) {
        return '';
      }

      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function normalizeDate(value) {
      return formatKuwaitDate(value);
    }

    function normalizeDepartment(value) {
      const normalized = String(value || '').trim();
      if (normalized === 'الإحصاء') return 'الاحصاء';
      return normalized;
    }

    function syncDateDisplays() {
      empDateDisplayInput.value = formatKuwaitDate(empDateInput.value);
      startDateDisplayInput.value = formatKuwaitDate(startDateInput.value);
      endDateDisplayInput.value = formatKuwaitDate(endDateInput.value);
    }

    function renderDepartmentOptions(preferredValue = '') {
      const uniqueDepartments = [...new Set(
        departmentSectionRows
          .map((item) => normalizeDepartment(item.Department))
          .filter(Boolean)
      )];

      departmentInput.innerHTML = '<option value="">-- اختر --</option>';
      uniqueDepartments.forEach((department) => {
        const option = document.createElement('option');
        option.value = department;
        option.textContent = department;
        departmentInput.appendChild(option);
      });

      departmentInput.value = uniqueDepartments.includes(preferredValue) ? preferredValue : '';
    }

    function renderSectionOptions(selectedDepartment = '', preferredSection = '') {
      const normalizedDepartmentValue = normalizeDepartment(selectedDepartment);
      const sectionValues = departmentSectionRows
        .filter((item) => normalizeDepartment(item.Department) === normalizedDepartmentValue)
        .map((item) => String(item.Section || '').trim())
        .filter(Boolean);

      sectionInput.innerHTML = '<option value="">-- اختر --</option>';
      sectionValues.forEach((section) => {
        const option = document.createElement('option');
        option.value = section;
        option.textContent = section;
        sectionInput.appendChild(option);
      });

      sectionInput.value = sectionValues.includes(preferredSection) ? preferredSection : '';
    }

    function renderSubSectionOptions(selectedDepartment = '', selectedSection = '', preferredSubSection = '') {
      const normalizedDepartmentValue = normalizeDepartment(selectedDepartment);
      const normalizedSectionValue = String(selectedSection || '').trim();
      const subSectionValues = departmentSectionRows
        .filter((item) => normalizeDepartment(item.Department) === normalizedDepartmentValue && String(item.Section || '').trim() === normalizedSectionValue)
        .map((item) => String(item.SubSection || '').trim())
        .filter(Boolean);

      subSectionInput.innerHTML = '<option value="">-- اختر --</option>';
      subSectionValues.forEach((subSection) => {
        const option = document.createElement('option');
        option.value = subSection;
        option.textContent = subSection;
        subSectionInput.appendChild(option);
      });

      subSectionInput.value = subSectionValues.includes(preferredSubSection) ? preferredSubSection : '';
    }

    function collectPayload() {
      return {
        // Database stores these two fields inversely in legacy records.
        Rank: titleInput.value.trim(),
        Work: workInput.value.trim(),
        Empdate: normalizeDate(empDateInput.value),
        Name: nameInput.value.trim(),
        Department: normalizeDepartment(departmentInput.value),
        Startdate: normalizeDate(startDateInput.value),
        CivilID: civilIdInput.value.trim(),
        Section: sectionInput.value.trim(),
        SubSection: subSectionInput.value.trim(),
        Enddate: normalizeDate(endDateInput.value),
        Title: rankInput.value.trim(),
        Status: statusInput.value.trim(),
        Note: noteInput.value.trim(),
        userName: currentUser.username || 'system'
      };
    }

    function clearForm() {
      selectedId = null;
      employeeIdInput.value = '';
      form.reset();
      renderDepartmentOptions();
      renderSectionOptions();
      renderSubSectionOptions();
      Array.from(rowsBody.querySelectorAll('tr')).forEach((row) => row.classList.remove('selected'));
      applyNameFilter();
    }

      workInput.value = '';
      empDateInput.value = '';
      empDateDisplayInput.value = '';
      nameInput.value = '';
      renderDepartmentOptions();
      startDateInput.value = '';
      startDateDisplayInput.value = '';
      civilIdInput.value = '';
      renderSectionOptions();
      renderSubSectionOptions();
      endDateInput.value = '';
      endDateDisplayInput.value = '';
      titleInput.value = '';
      statusInput.value = '';
      noteInput.value = '';

    function fillForm(item) {
      selectedId = item.ID;
      employeeIdInput.value = item.ID;
      rankInput.value = item.Title || '';
      workInput.value = item.Work || '';
      empDateInput.value = toDateInputValue(item.Empdate);
      empDateDisplayInput.value = formatKuwaitDate(item.Empdate);
      nameInput.value = item.Name || '';
      renderDepartmentOptions(normalizeDepartment(item.Department));
      startDateInput.value = toDateInputValue(item.Startdate);
      startDateDisplayInput.value = formatKuwaitDate(item.Startdate);
      civilIdInput.value = item.CivilID || '';
      renderSectionOptions(normalizeDepartment(item.Department), item.Section || '');
      renderSubSectionOptions(normalizeDepartment(item.Department), item.Section || '', item.SubSection || '');
      endDateInput.value = toDateInputValue(item.Enddate);
      endDateDisplayInput.value = formatKuwaitDate(item.Enddate);
      titleInput.value = item.Rank || '';
      statusInput.value = item.Status || '';
      noteInput.value = item.Note || '';
    }

    function getHeaders() {
      return {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${authToken}`
      };
    }

    function getApiErrorMessage(response, data) {
      const serverMessage = String(data?.message || '').trim();
      if (serverMessage) {
        return serverMessage;
      }

      if (response.status === 400) return 'البيانات المدخلة غير مكتملة أو غير صحيحة.';
      if (response.status === 404) return 'السجل المطلوب غير موجود.';
      if (response.status === 409) return 'تعذر تنفيذ العملية بسبب تعارض أو تكرار في البيانات.';
      if (response.status >= 500) return 'حدث خطأ في الخادم أو قاعدة البيانات. حاول مرة أخرى.';
      return 'تعذر إكمال العملية. تحقق من الاتصال ثم حاول مرة أخرى.';
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, options);
      if (response.status === 401 || response.status === 403) {
        localStorage.removeItem('authToken');
        window.location.href = '/';
        return null;
      }

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(getApiErrorMessage(response, data));
      }
      return data;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function safeValue(value) {
      const text = String(value ?? '').trim();
      return text ? escapeHtml(text) : '---';
    }

      const valueOrDash = (value) => {

      let transferReason = '';
      if (!isActive && noteValue) {
        const found = transferKeywords.find((keyword) => noteValue.includes(keyword));
        transferReason = found || noteValue;
      }
      const transferType = isActive ? '' : transferReason;

      return `

    function printSelectedEmployeeCv() {
      clearStatus();

      if (!selectedId) {
        showStatus('اختر موظفاً من صندوق البيانات أولاً قبل الطباعة.', true);
        return;
      }

      const employee = allEmployees.find((item) => String(item.ID) === String(selectedId));
      if (!employee) {
        showStatus('تعذر العثور على بيانات الموظف المحدد للطباعة. جرّب تحديث عرض البيانات.', true);
        return;
      }

      const html = buildEmployeeCvPrintHtml(employee);
      const printFrame = document.createElement('iframe');
      printFrame.style.position = 'fixed';
      printFrame.style.left = '0';
      printFrame.style.bottom = '0';
      printFrame.style.width = '210mm';
      printFrame.style.height = '297mm';
      printFrame.style.border = '0';
      printFrame.style.opacity = '0.01';
      printFrame.style.pointerEvents = 'none';
      printFrame.style.zIndex = '-1';

      document.body.appendChild(printFrame);

      const frameWindow = printFrame.contentWindow;
      const frameDocument = printFrame.contentDocument || frameWindow?.document;
      if (!frameWindow || !frameDocument) {
        showStatus('تعذر تجهيز نافذة الطباعة. حاول مرة أخرى.', true);
        printFrame.remove();
        return;
      }

      const cleanup = () => {
        if (printFrame.isConnected) {
          printFrame.remove();
        }
      };

      const triggerPrint = () => {
        frameWindow.requestAnimationFrame(() => {
          frameWindow.requestAnimationFrame(() => {
            frameWindow.focus();
            frameWindow.print();
          });
        });
      };

      frameWindow.onafterprint = cleanup;
      window.setTimeout(cleanup, 60000);

      frameDocument.open();
      frameDocument.write(html);
      frameDocument.close();

      const images = Array.from(frameDocument.images || []);
      if (images.length === 0) {
        window.setTimeout(triggerPrint, 120);
        return;
      }

      let pending = images.length;
      const onImageDone = () => {
        pending -= 1;
        if (pending === 0) {
          window.setTimeout(triggerPrint, 120);
        }
      };

      images.forEach((img) => {
        if (img.complete) {
          onImageDone();
        } else {
          img.addEventListener('load', onImageDone, { once: true });
          img.addEventListener('error', onImageDone, { once: true });
        }
      });
    }

    function renderRows(items) {
      rowsBody.innerHTML = '';
      const activeTotal = allEmployees.filter((item) => String(item.Status || '').trim() === 'نشط').length;

      if (!Array.isArray(items) || items.length === 0) {
        rowsBody.innerHTML = '<tr><td colspan="13">لا توجد بيانات موظفين حالياً.</td></tr>';
        const hasFilter = Boolean(nameInput.value.trim());
        countLabel.textContent = hasFilter
          ? `عدد السجلات: 0 من ${activeTotal}`
          : 'عدد السجلات: 0';
        return;
      }

      items.forEach((item) => {
        const tr = document.createElement('tr');
        tr.dataset.id = item.ID;
        tr.innerHTML = `
          <td class="mono">${item.ID ?? ''}</td>
          <td>${item.Title ?? ''}</td>
          <td>${item.Name ?? ''}</td>
          <td>${item.CivilID ?? ''}</td>
          <td>${item.Rank ?? ''}</td>
          <td>${item.Department ?? ''}</td>
          <td>${item.Section ?? ''}</td>
          <td>${item.SubSection ?? ''}</td>
          <td>${item.Work ?? ''}</td>
          <td>${formatKuwaitDate(item.Empdate)}</td>
          <td>${formatKuwaitDate(item.Startdate)}</td>
          <td>${item.Status ?? ''}</td>
          <td>${item.Note ?? ''}</td>
        `;

        tr.addEventListener('click', () => {
          Array.from(rowsBody.querySelectorAll('tr')).forEach((row) => row.classList.remove('selected'));
          tr.classList.add('selected');
          fillForm(item);
          clearStatus();
        });

        rowsBody.appendChild(tr);
      });

      const hasFilter = Boolean(nameInput.value.trim());
      countLabel.textContent = hasFilter
        ? `عدد السجلات: ${items.length} من ${activeTotal}`
        : `عدد السجلات: ${items.length}`;

      if (selectedId) {
        const selectedRow = rowsBody.querySelector(`tr[data-id="${selectedId}"]`);
        if (selectedRow) {
          selectedRow.classList.add('selected');
        }
      }
    }

    function applyNameFilter() {
      const activeEmployees = allEmployees.filter((item) =>
        String(item.Status || '').trim() === 'نشط'
      );

      const keyword = nameInput.value.trim().toLowerCase();
      if (!keyword) {
        renderRows(activeEmployees);
        return;
      }

      const filtered = activeEmployees.filter((item) =>
        String(item.Name || '').toLowerCase().includes(keyword)
      );
      renderRows(filtered);
    }

    async function loadEmployees() {
      try {
        const data = await requestJson('/api/employees', {
          headers: { Authorization: `Bearer ${authToken}` }
        });

        if (data) {
          allEmployees = Array.isArray(data) ? data : [];
          applyNameFilter();
        }
      } catch (error) {
        showStatus(error.message, true);
      }
    }

    async function loadDepartmentSections() {
      try {
        const data = await requestJson('/api/employees/department-sections', {
          headers: { Authorization: `Bearer ${authToken}` }
        });

        departmentSectionRows = Array.isArray(data) ? data : [];
        renderDepartmentOptions(normalizeDepartment(departmentInput.value));
        renderSectionOptions(normalizeDepartment(departmentInput.value), sectionInput.value);
        renderSubSectionOptions(normalizeDepartment(departmentInput.value), sectionInput.value, subSectionInput.value);
      } catch (error) {
        showStatus(error.message, true);
      }
    }

      event.preventDefault();
      clearStatus();

      if (!validateForm()) {
        return;
      }

      addBtn.disabled = true;

      try {
        const payload = collectPayload();
        await requestJson('/api/employees', {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify(payload)
        });

        showStatus('تمت إضافة بيانات الموظف بنجاح');
        clearForm();
        await loadEmployees();
      } catch (error) {
        showStatus(error.message, true);
      } finally {

        return;
      }

      if (!validateForm()) {
        return;
      }

      updateBtn.disabled = true;

      try {
        const payload = collectPayload();
        const result = await requestJson(`/api/employees/${selectedId}`, {
          method: 'PUT',
          headers: getHeaders(),
          body: JSON.stringify(payload)
        });

        if (result?.movedToOutside) {
          showStatus('تم تعديل حالة الملف إلى غير نشط، وتم نقل الموظف إلى بيانات خارج الإدارة.');
          clearForm();
        } else {
          showStatus('تم تعديل بيانات الموظف بنجاح');
        }
        await loadEmployees();
      } catch (error) {
        showStatus(error.message, true);
      } finally {
        updateBtn.disabled = false;
      }
    });

    deleteBtn.addEventListener('click', async () => {
      clearStatus();

      if (!selectedId) {
        showStatus('اختر موظفاً من صندوق البيانات أولاً للحذف.', true);
        return;
      }

      const ok = confirm('هل أنت متأكد من حذف بيانات هذا الموظف؟');
      if (!ok) {
        return;
      }

      deleteBtn.disabled = true;

      try {
        await requestJson(`/api/employees/${selectedId}`, {
          method: 'DELETE',
          headers: getHeaders(),
          body: JSON.stringify({ userName: currentUser.username || 'system' })
        });

        showStatus('تم حذف بيانات الموظف بنجاح');
        clearForm();
        await loadEmployees();
      } catch (error) {
        showStatus(error.message, true);
      } finally {
        deleteBtn.disabled = false;
      }
    });

    printBtn.addEventListener('click', () => {
      printSelectedEmployeeCv();
    });

    refreshBtn.addEventListener('click', async () => {
      clearStatus();
      await loadEmployees();
    });

    civilIdInput.addEventListener('input', () => {
      civilIdInput.value = civilIdInput.value.replace(/\D/g, '').slice(0, 12);
    });

    departmentInput.addEventListener('change', () => {
      renderSectionOptions(normalizeDepartment(departmentInput.value));
      renderSubSectionOptions(normalizeDepartment(departmentInput.value), sectionInput.value);
    });

    sectionInput.addEventListener('change', () => {
      renderSubSectionOptions(normalizeDepartment(departmentInput.value), sectionInput.value);
    });

    [empDateInput, startDateInput, endDateInput].forEach((dateInput) => {
      dateInput.addEventListener('change', syncDateDisplays);
    });

    dateOpenButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const pickerId = button.dataset.pickerId;
        const pickerInput = document.getElementById(pickerId);
        if (!pickerInput) {
          return;
        }

        if (typeof pickerInput.showPicker === 'function') {
          pickerInput.showPicker();
          return;
        }

        pickerInput.click();
      });
    });

    nameInput.addEventListener('input', () => {
      if (!nameInput.value.trim()) {
        resetAfterNameClear();
        return;
      }
      applyNameFilter();
    });

    backBtn.addEventListener('click', () => {
      window.location.href = '/dashboard.html';
    });

    loadDepartmentSections();
    loadEmployees();
    syncDateDisplays();
  </script>
</body>
</html>
