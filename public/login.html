<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول</title>
  <link rel="stylesheet" href="/layout-defaults.css" />
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      color: #fff;
      background:
        linear-gradient(rgba(10, 24, 45, 0.72), rgba(10, 24, 45, 0.72)),
        url('/images/background.png') center center no-repeat;
      background-size: cover;
    }
    .card {
      background: rgba(255,255,255,0.96);
      color: #111827;
      padding: 14px;
      border-radius: 12px;
      width: min(190px, 88vw);
      transform: translate(-34px, 58px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.4);
      backdrop-filter: blur(8px);
    }
    .logo {
      display: block;
      width: 52px;
      height: 52px;
      margin: 0 auto 8px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #2563eb;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.25);
    }
    h2 { margin-top: 0; margin-bottom: 8px; text-align: center; color: #1d4ed8; font-size: 16px; }
    .version {
      text-align: center;
      font-size: 11px;
      color: #475569;
      margin: -2px 0 8px;
      font-weight: 600;
    }
    label { display: block; margin: 8px 0 4px; font-size: 13px; font-weight: bold; }
    input {
      width: 100%;
      padding: 7px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
      margin-bottom: 6px;
      outline: none;
      font-size: 12px;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.2); }
    button {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }
    button:hover { background: linear-gradient(135deg, #1d4ed8, #1e40af); }
    .remember {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 10px 0 2px;
      font-size: 12px;
      color: #334155;
    }
    .remember input {
      width: 14px;
      height: 14px;
      accent-color: #2563eb;
    }
    .message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .message.success { background: #dcfce7; color: #166534; display: block; }
    .message.error { background: #fee2e2; color: #b91c1c; display: block; }
    .hint { font-size: 10px; color: #6b7280; margin-top: 6px; text-align: center; }

    @media (max-width: 768px) {
      .card {
        transform: translate(-16px, 34px);
      }
    }
  </style>
</head>
<body class="auth-shell">
  <div class="card">
    <img class="logo" src="/images/logo.png" alt="logo" />
    <h2>واجهة الدخول</h2>
    <div class="version">إصدار النظام 3.0</div>
    <form id="loginForm">
      <label for="username">اسم المستخدم</label>
      <input id="username" name="username" required autocomplete="username" />

      <label for="password">كلمة المرور</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" />

      <label class="remember">
        <input id="remember" type="checkbox" />
        تذكرني
      </label>

      <button type="submit">دخول</button>
    </form>

    <div id="message" class="message"></div>
    <div class="hint">يتم الاتصال بقاعدة البيانات: Z:\database.db</div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const messageBox = document.getElementById('message');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const rememberCheckbox = document.getElementById('remember');

    function clearSessionLocalState() {
      localStorage.removeItem('activityLog');
      localStorage.removeItem('loggedInUser');
    }

    function clearRememberedCredentials() {
      localStorage.removeItem('rememberLogin');
      localStorage.removeItem('loginUsername');
      localStorage.removeItem('loginPassword');
    }

    function updateRememberedState() {
      if (rememberCheckbox.checked) {
        localStorage.setItem('rememberLogin', 'true');
        localStorage.setItem('loginUsername', usernameInput.value);
        localStorage.setItem('loginPassword', passwordInput.value);
      } else {
        clearRememberedCredentials();
      }
    }

    function loadRememberedCredentials() {
      const remembered = localStorage.getItem('rememberLogin') === 'true';
      if (!remembered) {
        return;
      }

      rememberCheckbox.checked = true;
      usernameInput.value = localStorage.getItem('loginUsername') || '';
      passwordInput.value = localStorage.getItem('loginPassword') || '';
    }

    clearSessionLocalState();
    loadRememberedCredentials();

    usernameInput.addEventListener('input', () => {
      if (rememberCheckbox.checked) {
        updateRememberedState();
      }
    });

    passwordInput.addEventListener('input', () => {
      if (rememberCheckbox.checked) {
        updateRememberedState();
      }
    });

    rememberCheckbox.addEventListener('change', () => {
      updateRememberedState();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const payload = Object.fromEntries(formData.entries());

      messageBox.className = 'message';
      messageBox.textContent = 'جاري التحقق...';
      messageBox.style.display = 'block';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        messageBox.className = `message ${response.ok ? 'success' : 'error'}`;
        messageBox.textContent = result.message || 'تمت العملية';

        if (response.ok) {
          clearSessionLocalState();
          if (rememberCheckbox.checked) {
            updateRememberedState();
          } else {
            clearRememberedCredentials();
          }
          localStorage.setItem('authToken', result.token);
          window.location.href = '/dashboard.html';
          return;
        }
      } catch (err) {
        messageBox.className = 'message error';
        messageBox.textContent = 'حدث خطأ أثناء الاتصال بالخادم';
      }
    });
  </script>
</body>
</html>
