<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التنقلات</title>
  <style>
    :root {
      --bg: #eef4ff;
      --panel: #ffffff;
      --primary: #1d4ed8;
      --primary-dark: #1e40af;
      --danger: #dc2626;
      --danger-dark: #b91c1c;
      --border: rgba(15, 23, 42, 0.12);
      --text: #0f172a;
      --muted: #64748b;
      --ok: #166534;
      --ok-bg: #dcfce7;
      --err: #b91c1c;
      --err-bg: #fee2e2;
    }

    * { box-sizing: border-box; }

    body {
      font-family: Tahoma, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #dfeaff 0%, #f8fbff 100%);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .header p {
      margin: 5px 0 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    .admin-only-field {
      display: none;
    }

    .user-name-column {
      display: table-cell;
    }

    .transfer-columns {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .transfer-stack {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    label {
      font-size: 13px;
      color: #334155;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }

    input[readonly] {
      background: #f8fafc;
      color: #334155;
    }

    .date-picker-wrap { position: relative; }

    .date-display-input {
      padding-left: 44px;
      cursor: pointer;
      direction: ltr;
      text-align: right;
    }

    .date-picker-trigger {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 26px;
      height: 26px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #f8fafc;
      color: #1e293b;
      font-size: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      padding: 0;
    }

    .date-picker-trigger::before {
      content: '📅';
      font-size: 14px;
      line-height: 1;
    }

    .date-picker-trigger:hover { background: #eef2ff; }

    .native-date-input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    .toolbar {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .status-line {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .status-line.show { display: block; }
    .status-line.ok { background: var(--ok-bg); color: var(--ok); }
    .status-line.error { background: var(--err-bg); color: var(--err); }

    .table-tools {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: nowrap;
      margin-bottom: 10px;
    }

    .table-tools p {
      margin: 0;
      color: var(--muted);
      font-weight: 700;
    }

    .table-search {
      flex: 1;
      min-width: 0;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1200px;
      background: #fff;
    }

    th, td {
      padding: 11px 9px;
      border-bottom: 1px solid #e2e8f0;
      text-align: right;
      font-size: 14px;
    }

    th {
      background: #f8fafc;
      color: #475569;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody tr:hover {
      background: #f8fbff;
      cursor: pointer;
    }

    tbody tr.selected { background: #dbeafe; }

    .mono {
      direction: ltr;
      unicode-bidi: isolate;
      text-align: center;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      table { min-width: 1000px; }
    }

    @media (max-width: 680px) {
      .grid { grid-template-columns: 1fr; }
      table { min-width: 900px; }
    }
  </style>
  <link rel="stylesheet" href="/layout-defaults.css" />
</head>
<body class="app-shell">
  <div class="page app-page">
    <header class="header">
      <div>
        <h1>التنقلات</h1>
        <p>إدارة بيانات الموظفين المنقولين بين الأقسام والنوبات.</p>
      </div>
      <div class="actions">
        <button type="button" class="btn dark" id="backBtn">رجوع للرئيسية</button>
      </div>
    </header>

    <section class="panel">
      <h2>تعبئة / اظهار البيانات</h2>
      <form id="transferForm">
        <input id="transferId" type="hidden" />

        <div class="grid">
          <div class="field">
            <label for="name">اسم الموظف</label>
            <input id="name" list="employeeNames" autocomplete="off" />
            <datalist id="employeeNames"></datalist>
          </div>

          <div class="field">
            <label for="status">الحالة</label>
            <input id="status" value="نقل" readonly />
          </div>

          <div class="field">
            <label for="transferDate">تاريخ النقل</label>
            <div class="date-picker-wrap">
              <input id="transferDateDisplay" class="date-display-input" type="text" placeholder="yyyy/mm/dd" readonly />
              <button type="button" class="date-picker-trigger" data-picker-id="transferDate" aria-label="اختيار تاريخ النقل"></button>
              <input id="transferDate" type="date" class="native-date-input" />
            </div>
          </div>

          <div class="transfer-columns">
            <div class="transfer-stack">
              <div class="field">
                <label for="fromDepartment">من القسم</label>
                <input id="fromDepartment" readonly />
              </div>

              <div class="field">
                <label for="fromSection">من النوبة</label>
                <input id="fromSection" readonly />
              </div>

              <div class="field">
                <label for="fromSubSection">من الشعبة</label>
                <input id="fromSubSection" readonly />
              </div>
            </div>

            <div class="transfer-stack">
              <div class="field">
                <label for="toDepartment">إلى القسم</label>
                <select id="toDepartment">
                  <option value="">-- اختر --</option>
                </select>
              </div>

              <div class="field">
                <label for="toSection">إلى النوبة</label>
                <select id="toSection">
                  <option value="">-- اختر --</option>
                </select>
              </div>

              <div class="field">
                <label for="toSubSection">إلى الشعبة</label>
                <select id="toSubSection">
                  <option value="">-- اختر --</option>
                </select>
              </div>
            </div>
          </div>

          <div class="field full">
            <label for="note">ملاحظات</label>
            <textarea id="note"></textarea>
          </div>

          <div class="field full admin-only-field" id="userNameField">
            <label for="userName">اسم المستخدم</label>
            <input id="userName" type="text" readonly />
          </div>
        </div>

        <div class="toolbar">
          <button type="submit" class="btn success" id="addBtn">اضافة بيانات جديدة</button>
          <button type="button" class="btn warning" id="updateBtn">تعديل بيانات</button>
          <button type="button" class="btn danger" id="deleteBtn">حذف بيانات</button>
          <button type="button" class="btn primary" id="printBtn">طباعة بيانات</button>
        </div>
      </form>

      <div id="statusLine" class="status-line"></div>
    </section>

    <section class="panel">
      <h2>صندوق عرض البيانات</h2>
      <div class="table-tools">
        <p id="countLabel">عدد السجلات: 0</p>
        <input id="nameFilterInput" class="table-search" placeholder="فلترة بالاسم أثناء الكتابة" />
        <button type="button" class="btn primary" id="refreshBtn">تحديث العرض</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>م</th>
              <th>اسم الموظف</th>
              <th>الحالة</th>
              <th>تاريخ النقل</th>
              <th>من القسم</th>
              <th>إلى القسم</th>
              <th>من النوبة</th>
              <th>إلى النوبة</th>
              <th>من الشعبة</th>
              <th>إلى الشعبة</th>
              <th>ملاحظات</th>
              <th class="user-name-column">اسم المستخدم</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const authToken = localStorage.getItem('authToken');
    if (!authToken) {
      window.location.href = '/';
    }

    localStorage.removeItem('loggedInUser');

    function parseJwtPayload(token) {
      try {
        const payload = token.split('.')[1];
        if (!payload) return null;
        const normalized = payload.replace(/-/g, '+').replace(/_/g, '/');
        const decoded = atob(normalized.padEnd(Math.ceil(normalized.length / 4) * 4, '='));
        return JSON.parse(decoded);
      } catch (error) {
        return null;
      }
    }

    const currentUser = parseJwtPayload(authToken);
    if (!currentUser) {
      localStorage.removeItem('authToken');
      window.location.href = '/';
    }

    const isAdminUser = String(currentUser?.role || currentUser?.username || '').trim().toLowerCase() === 'admin';

    const form = document.getElementById('transferForm');
    const transferIdInput = document.getElementById('transferId');
    const nameInput = document.getElementById('name');
    const employeeNames = document.getElementById('employeeNames');
    const statusInput = document.getElementById('status');
    const transferDateDisplayInput = document.getElementById('transferDateDisplay');
    const transferDateInput = document.getElementById('transferDate');
    const fromDepartmentInput = document.getElementById('fromDepartment');
    const toDepartmentInput = document.getElementById('toDepartment');
    const fromSectionInput = document.getElementById('fromSection');
    const toSectionInput = document.getElementById('toSection');
    const fromSubSectionInput = document.getElementById('fromSubSection');
    const toSubSectionInput = document.getElementById('toSubSection');
    const noteInput = document.getElementById('note');
    const userNameInput = document.getElementById('userName');
    const userNameField = document.getElementById('userNameField');
    const dateOpenButtons = document.querySelectorAll('.date-picker-trigger');

    const addBtn = document.getElementById('addBtn');
    const updateBtn = document.getElementById('updateBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const printBtn = document.getElementById('printBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const backBtn = document.getElementById('backBtn');
    const nameFilterInput = document.getElementById('nameFilterInput');

    const rowsBody = document.getElementById('rows');
    const countLabel = document.getElementById('countLabel');
    const statusLine = document.getElementById('statusLine');
    const userNameColumnCells = () => document.querySelectorAll('.user-name-column');

    let selectedId = null;
    let allTransfers = [];
    let allEmployees = [];
    let selectedEmployee = null;
    let departmentSectionRows = [];

    if (userNameField) {
      userNameField.style.display = isAdminUser ? 'grid' : 'none';
    }

    function syncUserNameColumnVisibility() {
      userNameColumnCells().forEach((cell) => {
        cell.style.display = isAdminUser ? 'table-cell' : 'none';
      });
    }

    function showStatus(message, isError = false) {
      statusLine.className = `status-line show ${isError ? 'error' : 'ok'}`;
      statusLine.textContent = message;
    }

    function clearStatus() {
      statusLine.className = 'status-line';
      statusLine.textContent = '';
    }

    function pad2(value) {
      return String(value).padStart(2, '0');
    }

    function parseFlexibleDate(value) {
      if (!value) return null;
      const raw = String(value).trim();
      if (!raw) return null;

      const ymd = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (ymd) {
        return new Date(Number(ymd[1]), Number(ymd[2]) - 1, Number(ymd[3]));
      }

      const ymdSlash = raw.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
      if (ymdSlash) {
        return new Date(Number(ymdSlash[1]), Number(ymdSlash[2]) - 1, Number(ymdSlash[3]));
      }

      const dmy = raw.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})$/);
      if (dmy) {
        return new Date(Number(dmy[3]), Number(dmy[2]) - 1, Number(dmy[1]));
      }

      return null;
    }

    function formatDateYmdSlash(value) {
      const date = parseFlexibleDate(value);
      if (!date || Number.isNaN(date.getTime())) return '';
      return `${date.getFullYear()}/${pad2(date.getMonth() + 1)}/${pad2(date.getDate())}`;
    }

    function toDateInputValue(value) {
      const date = parseFlexibleDate(value);
      if (!date || Number.isNaN(date.getTime())) return '';
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
    }

    function syncDateDisplays() {
      transferDateDisplayInput.value = formatDateYmdSlash(transferDateInput.value);
    }

    function getHeaders() {
      return {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${authToken}`
      };
    }

    function getApiErrorMessage(response, data) {
      const serverMessage = String(data?.message || '').trim();
      if (serverMessage) return serverMessage;
      if (response.status === 400) return 'البيانات المدخلة غير مكتملة أو غير صحيحة.';
      if (response.status === 404) return 'السجل المطلوب غير موجود.';
      if (response.status === 409) return 'تعذر تنفيذ العملية بسبب تعارض أو تكرار في البيانات.';
      if (response.status >= 500) return 'حدث خطأ في الخادم أو قاعدة البيانات. حاول مرة أخرى.';
      return 'تعذر إكمال العملية. تحقق من الاتصال ثم حاول مرة أخرى.';
    }

    async function requestJson(url, options = {}) {
      const response = await fetch(url, options);
      if (response.status === 401 || response.status === 403) {
        localStorage.removeItem('authToken');
        window.location.href = '/';
        return null;
      }

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(getApiErrorMessage(response, data));
      }

      return data;
    }

    function populateNameOptions() {
      employeeNames.innerHTML = '';
      const uniqueNames = Array.from(new Set(
        allEmployees
          .map((item) => String(item.Name || '').trim())
          .filter(Boolean)
      ));

      uniqueNames.forEach((name) => {
        const option = document.createElement('option');
        option.value = name;
        employeeNames.appendChild(option);
      });
    }

    function normalizeDepartment(value) {
      const normalized = String(value || '').trim();
      if (normalized === 'الإحصاء') return 'الاحصاء';
      return normalized;
    }

    function populateDepartmentOptions(preferredValue = '') {
      toDepartmentInput.innerHTML = '<option value="">-- اختر --</option>';

      const departments = [...new Set(
        departmentSectionRows
          .map((item) => normalizeDepartment(item.Department))
          .filter(Boolean)
      )];

      departments.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        toDepartmentInput.appendChild(option);
      });

      toDepartmentInput.value = departments.includes(preferredValue) ? preferredValue : '';
    }

    function populateSectionOptions(selectedDepartment = '', preferredValue = '') {
      toSectionInput.innerHTML = '<option value="">-- اختر --</option>';

      const sectionValues = departmentSectionRows
        .filter((item) => normalizeDepartment(item.Department) === normalizeDepartment(selectedDepartment))
        .map((item) => String(item.Section || '').trim())
        .filter(Boolean);

      sectionValues.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        toSectionInput.appendChild(option);
      });

      toSectionInput.value = sectionValues.includes(preferredValue) ? preferredValue : '';
    }

    function populateSubSectionOptions(selectedDepartment = '', selectedSection = '', preferredValue = '') {
      toSubSectionInput.innerHTML = '<option value="">-- اختر --</option>';

      const subSectionValues = departmentSectionRows
        .filter((item) => normalizeDepartment(item.Department) === normalizeDepartment(selectedDepartment) && String(item.Section || '').trim() === String(selectedSection || '').trim())
        .map((item) => String(item.SubSection || '').trim())
        .filter(Boolean);

      subSectionValues.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        toSubSectionInput.appendChild(option);
      });

      toSubSectionInput.value = subSectionValues.includes(preferredValue) ? preferredValue : '';
    }

    function setSelectedEmployeeByName(name) {
      const normalized = String(name || '').trim();
      selectedEmployee = allEmployees.find((item) => String(item.Name || '').trim() === normalized) || null;

      if (selectedEmployee) {
        fromDepartmentInput.value = selectedEmployee.Department || '';
        fromSectionInput.value = selectedEmployee.Section || '';
        fromSubSectionInput.value = selectedEmployee.SubSection || '';
      } else {
        fromDepartmentInput.value = '';
        fromSectionInput.value = '';
        fromSubSectionInput.value = '';
      }
    }

    function collectPayload() {
      const userNameValue = isAdminUser
        ? String(userNameInput.value || currentUser.username || 'system').trim()
        : String(currentUser.username || 'system').trim();

      return {
        EmpID: selectedEmployee?.ID || null,
        Name: String(nameInput.value || '').trim(),
        Department: String(fromDepartmentInput.value || '').trim(),
        Section: String(fromSectionInput.value || '').trim(),
        SubSection: String(fromSubSectionInput.value || '').trim(),
        Status: 'نقل',
        Department1: String(toDepartmentInput.value || '').trim(),
        Section1: String(toSectionInput.value || '').trim(),
        SubSection1: String(toSubSectionInput.value || '').trim(),
        Enddate: formatDateYmdSlash(transferDateInput.value),
        Note: String(noteInput.value || '').trim(),
        UserName: userNameValue,
        userName: userNameValue
      };
    }

    function validateForm() {
      const requiredErrors = [];
      if (!String(nameInput.value || '').trim()) requiredErrors.push('اسم الموظف');
      if (!String(transferDateInput.value || '').trim()) requiredErrors.push('تاريخ النقل');
      if (!String(toDepartmentInput.value || '').trim()) requiredErrors.push('إلى القسم');
      if (!String(toSectionInput.value || '').trim()) requiredErrors.push('إلى النوبة');

      if (requiredErrors.length) {
        showStatus(`الحقول الإلزامية ناقصة: ${requiredErrors.join(' - ')}`, true);
        return false;
      }

      const transferDate = parseFlexibleDate(transferDateInput.value);
      if (!transferDate || Number.isNaN(transferDate.getTime())) {
        showStatus('تأكد من صحة تاريخ النقل.', true);
        return false;
      }

      return true;
    }

    function clearForm() {
      selectedId = null;
      transferIdInput.value = '';
      form.reset();
      selectedEmployee = null;
      statusInput.value = 'نقل';
      transferDateDisplayInput.value = '';
      fromDepartmentInput.value = '';
      fromSectionInput.value = '';
      fromSubSectionInput.value = '';
      populateDepartmentOptions();
      populateSectionOptions();
      populateSubSectionOptions();
      if (userNameInput) {
        userNameInput.value = String(currentUser?.username || 'system');
      }
      syncUserNameColumnVisibility();
      Array.from(rowsBody.querySelectorAll('tr')).forEach((row) => row.classList.remove('selected'));
      applyNameFilter();
    }

    function fillForm(item) {
      selectedId = item.ID;
      transferIdInput.value = item.ID;
      nameInput.value = item.Name || '';
      setSelectedEmployeeByName(item.Name || '');
      if (!selectedEmployee) {
        fromDepartmentInput.value = item.Department || '';
        fromSectionInput.value = item.Section || '';
        fromSubSectionInput.value = item.SubSection || '';
      }
      statusInput.value = item.Status || 'نقل';
      populateDepartmentOptions(normalizeDepartment(item.Department1 || ''));
      populateSectionOptions(normalizeDepartment(item.Department1 || ''), item.Section1 || '');
      populateSubSectionOptions(normalizeDepartment(item.Department1 || ''), item.Section1 || '', item.SubSection1 || '');
      transferDateInput.value = toDateInputValue(item.Enddate);
      syncDateDisplays();
      noteInput.value = item.Note || '';
      if (userNameInput) {
        userNameInput.value = item.UserName || currentUser?.username || 'system';
      }
    }

    function renderRows(items) {
      rowsBody.innerHTML = '';

      if (!Array.isArray(items) || items.length === 0) {
        rowsBody.innerHTML = `<tr><td colspan="${isAdminUser ? 12 : 11}">لا توجد بيانات تنقلات حالياً.</td></tr>`;
        countLabel.textContent = 'عدد السجلات: 0';
        syncUserNameColumnVisibility();
        return;
      }

      items.forEach((item) => {
        const tr = document.createElement('tr');
        tr.dataset.id = item.ID;
        tr.innerHTML = `
          <td class="mono">${item.ID ?? ''}</td>
          <td>${item.Name ?? ''}</td>
          <td>${item.Status ?? ''}</td>
          <td class="mono">${formatDateYmdSlash(item.Enddate)}</td>
          <td>${item.Department ?? ''}</td>
          <td>${item.Department1 ?? ''}</td>
          <td>${item.Section ?? ''}</td>
          <td>${item.Section1 ?? ''}</td>
          <td>${item.SubSection ?? ''}</td>
          <td>${item.SubSection1 ?? ''}</td>
          <td>${item.Note ?? ''}</td>
          <td class="user-name-column">${item.UserName ?? ''}</td>
        `;

        tr.addEventListener('click', () => {
          Array.from(rowsBody.querySelectorAll('tr')).forEach((row) => row.classList.remove('selected'));
          tr.classList.add('selected');
          fillForm(item);
          clearStatus();
        });

        rowsBody.appendChild(tr);
      });

      countLabel.textContent = `عدد السجلات: ${items.length}`;
      syncUserNameColumnVisibility();

      if (selectedId) {
        const selectedRow = rowsBody.querySelector(`tr[data-id="${selectedId}"]`);
        if (selectedRow) {
          selectedRow.classList.add('selected');
        }
      }
    }

    function applyNameFilter() {
      const keyword = String(nameFilterInput.value || '')
        .toLowerCase()
        .replace(/\s+/g, ' ')
        .trim();

      if (!keyword) {
        renderRows(allTransfers);
        return;
      }

      const parts = keyword.split(' ').filter(Boolean);
      const filtered = allTransfers.filter((item) =>
        parts.every((part) =>
          String(item.Name || '')
            .toLowerCase()
            .replace(/\s+/g, ' ')
            .trim()
            .includes(part)
        )
      );
      renderRows(filtered);
    }

    async function loadEmployees() {
      const data = await requestJson('/api/employees', {
        headers: { Authorization: `Bearer ${authToken}` }
      });

      if (!data) return;
      allEmployees = (Array.isArray(data) ? data : []).filter(
        (item) => String(item?.Status || '').trim() === 'نشط'
      );
      populateNameOptions();
      setSelectedEmployeeByName(nameInput.value);
    }

    async function loadDepartmentSections() {
      const data = await requestJson('/api/employees/department-sections', {
        headers: { Authorization: `Bearer ${authToken}` }
      });

      if (!data) return;
      departmentSectionRows = Array.isArray(data) ? data : [];
      populateDepartmentOptions(normalizeDepartment(toDepartmentInput.value));
      populateSectionOptions(normalizeDepartment(toDepartmentInput.value), toSectionInput.value);
      populateSubSectionOptions(normalizeDepartment(toDepartmentInput.value), toSectionInput.value, toSubSectionInput.value);
    }

    async function loadTransfers() {
      const data = await requestJson('/api/administrative/transfers', {
        headers: { Authorization: `Bearer ${authToken}` }
      });

      if (!data) return;
      allTransfers = Array.isArray(data) ? data : [];
      applyNameFilter();
    }

    function buildPrintHtml(item) {
      const logoUrl = `${window.location.origin}/images/logo.png`;
      const row = item || {
        Name: nameInput.value,
        Status: statusInput.value,
        Department: fromDepartmentInput.value,
        Department1: toDepartmentInput.value,
        Section: fromSectionInput.value,
        Section1: toSectionInput.value,
        SubSection: fromSubSectionInput.value,
        SubSection1: toSubSectionInput.value,
        Enddate: transferDateInput.value,
        Note: noteInput.value
      };

      const now = new Date();
      const stamp = `${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())} ${now.getFullYear()}/${pad2(now.getMonth() + 1)}/${pad2(now.getDate())}`;
      const valueOrDash = (value) => {
        const text = String(value ?? '').trim();
        return text ? text : '---';
      };

      return `
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>بيانات النقل - ${valueOrDash(row.Name)}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Tahoma', Arial, sans-serif;
      background: #fff;
      color: #0f172a;
    }
    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 10mm;
      background: #fff;
    }
    .sheet {
      border: 1.5px solid #0f172a;
      min-height: 277mm;
      padding: 7mm;
      display: flex;
      flex-direction: column;
      gap: 4mm;
    }
    .top {
      display: grid;
      grid-template-columns: 30mm 1fr 36mm;
      align-items: start;
      gap: 4mm;
    }
    .photo {
      height: 38mm;
      border: 1px solid #334155;
      display: grid;
      place-items: center;
      color: #94a3b8;
      font-size: 5.5mm;
      font-weight: 700;
      background: #f8fafc;
    }
    .title-wrap {
      text-align: center;
      padding-top: 1mm;
    }
    .title {
      margin: 0;
      font-size: 11mm;
      line-height: 1.2;
      font-family: 'PT Bold', 'PT Sans', Tahoma, Arial, sans-serif;
      font-weight: 800;
      color: #0b3a6f;
    }
    .org {
      text-align: center;
      font-size: 2.9mm;
      line-height: 1.35;
      color: #1e293b;
      font-weight: 700;
    }
    .org img {
      width: 18mm;
      height: 18mm;
      object-fit: contain;
      display: block;
      margin: 0 auto 1mm;
    }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2mm;
      font-size: 3.1mm;
      color: #334155;
    }
    .meta div {
      border: 1px solid #cbd5e1;
      padding: 1.2mm 1.8mm;
      border-radius: 1.5mm;
      background: #f8fafc;
    }
    .section {
      border: 1px solid #0f172a;
      border-radius: 1.5mm;
      overflow: hidden;
    }
    .section-title {
      background: #0b3a6f;
      color: #fff;
      font-size: 3.4mm;
      font-weight: 700;
      padding: 1.4mm 2.2mm;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    td {
      border: 1px solid #cbd5e1;
      padding: 1.8mm 2mm;
      font-size: 3.5mm;
      vertical-align: middle;
    }
    .label {
      width: 26mm;
      background: #f8fafc;
      font-weight: 700;
      color: #334155;
      text-align: center;
    }
    .value {
      font-weight: 700;
      text-align: right;
      color: #0f172a;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .ltr {
      direction: ltr;
      unicode-bidi: isolate;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .note {
      margin-top: auto;
      border-top: 0;
      padding-top: 1mm;
      font-size: 3.1mm;
      color: #334155;
      line-height: 1.45;
      display: flex;
      align-items: center;
      gap: 4mm;
    }
    .note-text {
      flex: 1 1 auto;
    }
    .note-sign {
      min-width: 55mm;
      text-align: left;
      direction: rtl;
      unicode-bidi: plaintext;
    }
    @media print {
      @page { size: A4; margin: 0; }
      .page { width: 210mm; min-height: 297mm; padding: 10mm; }
    }
  </style>
</head>
<body>
  <section class="page">
    <article class="sheet">
      <header class="top">
        <div class="org">
          <img src="${logoUrl}" alt="شعار الإدارة" />
          ادارة البلاغات<br>
          قسم الخدمات المساندة<br>
          شعبة التحضير
        </div>
        <div class="title-wrap">
          <h1 class="title">بيانات النقل</h1>
        </div>
        <div class="photo">صورة</div>
      </header>

      <div class="meta">
        <div>رقم المرجع: ${valueOrDash(row.ID || selectedId)}</div>
        <div class="ltr">وقت الطباعة: ${stamp}</div>
      </div>

      <section class="section">
        <div class="section-title">البيانات الأساسية</div>
        <table>
          <tr>
            <td class="label">اسم الموظف</td>
            <td class="value">${valueOrDash(row.Name)}</td>
            <td class="label">الحالة</td>
            <td class="value">${valueOrDash(row.Status)}</td>
          </tr>
          <tr>
            <td class="label">من القسم</td>
            <td class="value">${valueOrDash(row.Department)}</td>
            <td class="label">إلى القسم</td>
            <td class="value">${valueOrDash(row.Department1)}</td>
          </tr>
          <tr>
            <td class="label">من النوبة</td>
            <td class="value">${valueOrDash(row.Section)}</td>
            <td class="label">إلى النوبة</td>
            <td class="value">${valueOrDash(row.Section1)}</td>
          </tr>
          <tr>
            <td class="label">من الشعبة</td>
            <td class="value">${valueOrDash(row.SubSection)}</td>
            <td class="label">إلى الشعبة</td>
            <td class="value">${valueOrDash(row.SubSection1)}</td>
          </tr>
        </table>
      </section>

      <section class="section">
        <div class="section-title">البيانات الزمنية</div>
        <table>
          <tr>
            <td class="label">تاريخ النقل</td>
            <td class="value ltr" colspan="3">${valueOrDash(formatDateYmdSlash(row.Enddate))}</td>
          </tr>
        </table>
      </section>

      <section class="section">
        <div class="section-title">ملاحظات</div>
        <table>
          <tr>
            <td class="value" style="min-height:34mm; line-height:1.6;">${valueOrDash(row.Note)}</td>
          </tr>
        </table>
      </section>

      <div class="note">
        <span class="note-text">أقر أنا الموقع أدناه بأن البيانات أعلاه صحيحة، وأتعهد بإبلاغ الإدارة عند حدوث أي تغيير.</span>
        <span class="note-sign">التوقيع: ____________________</span>
      </div>
    </article>
  </section>
</body>
</html>`;
    }

    function printCurrentRecord() {
      const selected = allTransfers.find((item) => String(item.ID) === String(selectedId));
      const html = buildPrintHtml(selected);

      const frame = document.createElement('iframe');
      frame.style.position = 'fixed';
      frame.style.left = '0';
      frame.style.bottom = '0';
      frame.style.width = '210mm';
      frame.style.height = '297mm';
      frame.style.border = '0';
      frame.style.opacity = '0.01';
      frame.style.pointerEvents = 'none';
      frame.style.zIndex = '-1';
      document.body.appendChild(frame);

      const win = frame.contentWindow;
      const doc = frame.contentDocument || win?.document;
      if (!win || !doc) {
        showStatus('تعذر تجهيز نافذة الطباعة.', true);
        frame.remove();
        return;
      }

      const cleanup = () => {
        if (frame.isConnected) frame.remove();
      };

      win.onafterprint = cleanup;
      window.setTimeout(cleanup, 60000);

      doc.open();
      doc.write(html);
      doc.close();

      window.setTimeout(() => {
        win.focus();
        win.print();
      }, 130);
    }

    [transferDateInput].forEach((dateInput) => {
      dateInput.addEventListener('change', syncDateDisplays);
    });

    dateOpenButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const pickerId = button.dataset.pickerId;
        const pickerInput = document.getElementById(pickerId);
        if (!pickerInput) return;
        if (typeof pickerInput.showPicker === 'function') {
          pickerInput.showPicker();
          return;
        }
        pickerInput.click();
      });
    });

    function handleEmployeeNameSelection() {
      if (!String(nameInput.value || '').trim()) {
        clearForm();
        return;
      }

      setSelectedEmployeeByName(nameInput.value);
    }

    nameInput.addEventListener('input', handleEmployeeNameSelection);
    nameInput.addEventListener('change', handleEmployeeNameSelection);

    nameFilterInput.addEventListener('input', applyNameFilter);

    toDepartmentInput.addEventListener('focus', () => {
      populateDepartmentOptions(normalizeDepartment(toDepartmentInput.value));
    });
    toDepartmentInput.addEventListener('change', () => {
      populateSectionOptions(normalizeDepartment(toDepartmentInput.value));
      populateSubSectionOptions(normalizeDepartment(toDepartmentInput.value), toSectionInput.value);
    });
    toSectionInput.addEventListener('focus', () => {
      populateSectionOptions(normalizeDepartment(toDepartmentInput.value), toSectionInput.value);
    });
    toSectionInput.addEventListener('change', () => {
      populateSubSectionOptions(normalizeDepartment(toDepartmentInput.value), toSectionInput.value);
    });
    toSubSectionInput.addEventListener('focus', () => {
      populateSubSectionOptions(normalizeDepartment(toDepartmentInput.value), toSectionInput.value, toSubSectionInput.value);
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      clearStatus();

      if (!validateForm()) return;

      addBtn.disabled = true;
      try {
        const payload = collectPayload();
        await requestJson('/api/administrative/transfers', {
          method: 'POST',
          headers: getHeaders(),
          body: JSON.stringify(payload)
        });

        showStatus('تمت إضافة بيانات النقل بنجاح');
        clearForm();
        await loadTransfers();
      } catch (error) {
        showStatus(error.message, true);
      } finally {
        addBtn.disabled = false;
      }
    });

    updateBtn.addEventListener('click', async () => {
      clearStatus();

      if (!selectedId) {
        showStatus('اختر سجلاً من صندوق البيانات أولاً لتعديله.', true);
        return;
      }

      if (!validateForm()) return;

      updateBtn.disabled = true;
      try {
        const payload = collectPayload();
        await requestJson(`/api/administrative/transfers/${selectedId}`, {
          method: 'PUT',
          headers: getHeaders(),
          body: JSON.stringify(payload)
        });

        showStatus('تم تعديل بيانات النقل بنجاح');
        await loadTransfers();
      } catch (error) {
        showStatus(error.message, true);
      } finally {
        updateBtn.disabled = false;
      }
    });

    deleteBtn.addEventListener('click', async () => {
      clearStatus();

      if (!selectedId) {
        showStatus('اختر سجلاً من صندوق البيانات أولاً للحذف.', true);
        return;
      }

      const ok = confirm('هل أنت متأكد من حذف سجل النقل؟');
      if (!ok) return;

      deleteBtn.disabled = true;
      try {
        await requestJson(`/api/administrative/transfers/${selectedId}`, {
          method: 'DELETE',
          headers: getHeaders(),
          body: JSON.stringify({ userName: currentUser.username || 'system' })
        });

        showStatus('تم حذف بيانات النقل بنجاح');
        clearForm();
        await loadTransfers();
      } catch (error) {
        showStatus(error.message, true);
      } finally {
        deleteBtn.disabled = false;
      }
    });

    printBtn.addEventListener('click', () => {
      clearStatus();
      if (!selectedId && !String(nameInput.value || '').trim()) {
        showStatus('اختر سجلاً من صندوق البيانات أولاً قبل الطباعة.', true);
        return;
      }
      printCurrentRecord();
    });

    refreshBtn.addEventListener('click', async () => {
      clearStatus();
      await loadDepartmentSections();
      await loadEmployees();
      await loadTransfers();
      showStatus('تم تحديث عرض بيانات التنقلات');
    });

    backBtn.addEventListener('click', () => {
      window.location.href = '/dashboard.html';
    });

    (async () => {
      try {
        await loadDepartmentSections();
        await loadEmployees();
        await loadTransfers();
      } catch (error) {
        showStatus(error.message, true);
      }
    })();
  </script>
</body>
</html>
